<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer</title>
<style>
  body { font-family: 'Inter', sans-serif; background:#0f172a; color:#f1f5f9; padding:20px; }
  textarea { width:100%; height:120px; margin-bottom:10px; padding:10px; border-radius:5px; background:#1e293b; color:#f1f5f9; }
  input[type=file] { margin-bottom:15px; }
  button { padding:10px 20px; background:#22c55e; border:none; border-radius:5px; cursor:pointer; }
  #result { margin-top:20px; background:#1e293b; padding:15px; border-radius:5px; white-space:pre-wrap; }
</style>
</head>
<body>

<h1>🚀 AI Resume Analyzer</h1>

<h3>Job Description</h3>
<textarea id="jobdesc" placeholder="Paste Job Description here..."></textarea>
<input type="file" id="jd_file" accept=".pdf,.docx,.txt">

<h3>Resume</h3>
<textarea id="resume" placeholder="Paste Resume here..."></textarea>
<input type="file" id="resume_file" accept=".pdf,.docx,.txt">

<br>
<button onclick="analyzeResume()">Analyze Resume</button>

<div id="result"></div>

<script>
async function analyzeResume() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerText = "Analyzing resume... 🔎";

    const resumeText = document.getElementById('resume').value;
    const jdText = document.getElementById('jobdesc').value;

    const formData = new FormData();
    formData.append("resume", resumeText);
    formData.append("job_description", jdText);

    const resumeFile = document.getElementById('resume_file').files[0];
    if(resumeFile) formData.append("resume_file", resumeFile);

    const jdFile = document.getElementById('jd_file').files[0];
    if(jdFile) formData.append("jd_file", jdFile);

    try {
        const response = await fetch("http://127.0.0.1:5000/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        if(data.error) resultDiv.innerText = "❌ Error: " + data.error;
        else resultDiv.innerText = data.result;
    } catch(err) {
        resultDiv.innerText = "❌ Failed to fetch API. Make sure backend is running.";
    }
}
</script>

</body>
</html>
