<!DOCTYPE html>
<html>
<head>
<title>Resume AI SaaS</title>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; margin:0;}
.container { display:grid; grid-template-columns:1fr 2fr; gap:15px; padding:15px;}
.card { background:#1e293b; padding:15px; border-radius:10px;}
input, textarea { width:100%; padding:10px; margin-top:8px; background:#0f172a; color:white; border:1px solid #334155;}
button { padding:8px 12px; margin-top:8px; border:none; cursor:pointer;}
.btn-main { background:#6366f1; color:white;}
.btn-upgrade { background:red; color:white;}
#result { white-space:pre-wrap; margin-top:10px;}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h4>Account</h4>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h4>Job Description</h4>
<textarea id="jd_text"></textarea>
<input type="file" id="jd_file">
</div>

<div class="card">
<h4>Resume</h4>
<textarea id="resume_text"></textarea>
<input type="file" id="resume_file">
</div>

<div class="card">
<button class="btn-main" onclick="analyze()">Analyze</button>
<pre id="result"></pre>
</div>

<div class="card">
<button class="btn-upgrade" onclick="upgrade()">Upgrade</button>
</div>

</div>

<script>
const API="https://resumeanalyzer-5o8p.onrender.com";

// Load token from storage
let token = localStorage.getItem("token");

// -------- SIGNUP --------
async function signup(){
let r=await fetch(API+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
});
let d=await r.json();
alert(d.msg||d.error);
}

// -------- LOGIN --------
async function login(){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
});

let d=await r.json();

if(d.token){
token = d.token;

// ✅ SAVE TOKEN
localStorage.setItem("token", token);

alert("✅ Login successful");
}else{
alert(d.error);
}
}

// -------- LOGOUT --------
function logout(){
localStorage.removeItem("token");
token = null;
alert("Logged out");
}

// -------- ANALYZE --------
async function analyze(){

// 🔥 IMPORTANT CHECK
token = localStorage.getItem("token");

if(!token){
alert("❌ Please login first");
return;
}

let f=new FormData();
f.append("jd_text", jd_text.value);
f.append("resume_text", resume_text.value);

if(jd_file.files[0]) f.append("jd_file", jd_file.files[0]);
if(resume_file.files[0]) f.append("resume_file", resume_file.files[0]);

result.innerText="⏳ Analyzing...";

let r=await fetch(API+"/analyze",{
method:"POST",
headers:{
"Authorization": "Bearer " + token   // ✅ CRITICAL
},
body:f
});

let d=await r.json();

result.innerText = d.result || d.error;
}

// -------- UPGRADE --------
async function upgrade(){

token = localStorage.getItem("token");

if(!token){
alert("Login first");
return;
}

let r=await fetch(API+"/upgrade",{
method:"POST",
headers:{
"Authorization": "Bearer " + token
}
});

let d=await r.json();
alert(d.msg || d.error);
}
</script>
</body>
</html>
