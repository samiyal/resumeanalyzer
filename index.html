<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#020617;
}

.logo {
  font-size:20px;
  font-weight:bold;
}

.auth-buttons button {
  margin-left:10px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login { background:#1e293b; color:white; }
.signup { background:#2563eb; color:white; }

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  padding:20px;
  height:calc(100vh - 70px);
}

.card {
  background:#020617;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

textarea {
  flex:1;
  background:#0f172a;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
}

input[type="file"] {
  margin-top:10px;
}

/* BUTTON */
.analyze-btn {
  margin-top:10px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* RESULT */
.result {
  white-space:pre-wrap;
  overflow:auto;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.modal input {
  width:100%;
  margin:10px 0;
  padding:8px;
}

.close {
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🚀 Resume AI</div>
  <div class="auth-buttons">
    <button class="login" onclick="openModal('loginModal')">Login</button>
    <button class="signup" onclick="openModal('signupModal')">Signup</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN GRID -->
<div class="container">

  <!-- JD -->
  <div class="card">
    <h3>Job Description</h3>
    <textarea id="jd_text" placeholder="Paste JD..."></textarea>
    <input type="file" id="jd_file">
  </div>

  <!-- RESUME -->
  <div class="card">
    <h3>Resume</h3>
    <textarea id="resume_text" placeholder="Paste Resume..."></textarea>
    <input type="file" id="resume_file">
    <button class="analyze-btn" onclick="analyze()">Analyze</button>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h3>Result</h3>
    <div id="result" class="result">Results will appear here...</div>
  </div>

</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('loginModal')">✖</span>
    <h3>Login</h3>
    <input id="login_email" placeholder="Email">
    <input id="login_password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SIGNUP MODAL -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('signupModal')">✖</span>
    <h3>Signup</h3>
    <input id="signup_email" placeholder="Email">
    <input id="signup_password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
  </div>
</div>

<script>
const API = "https://resumeanalyzer-5o8p.onrender.com";

// -------- MODALS --------
function openModal(id){ document.getElementById(id).style.display="flex"; }
function closeModal(id){ document.getElementById(id).style.display="none"; }

// -------- AUTH --------
async function signup(){
let r=await fetch(API+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:signup_email.value,
password:signup_password.value
})
});
let d=await r.json();
alert(d.msg||d.error);
}

async function login(){
let r=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:login_email.value,
password:login_password.value
})
});
let d=await r.json();
if(d.token){
localStorage.setItem("token", d.token);
alert("Login success");
closeModal('loginModal');
}else alert(d.error);
}

function logout(){
localStorage.removeItem("token");
alert("Logged out");
}

// -------- ANALYZE --------
async function analyze(){

let token = localStorage.getItem("token");
if(!token){
alert("Login first");
return;
}

let form = new FormData();

// FLEXIBLE INPUT
if(jd_text.value) form.append("jd_text", jd_text.value);
if(resume_text.value) form.append("resume_text", resume_text.value);

if(jd_file.files[0]) form.append("jd_file", jd_file.files[0]);
if(resume_file.files[0]) form.append("resume_file", resume_file.files[0]);

result.innerText="Analyzing...";

let r=await fetch(API+"/analyze",{
method:"POST",
headers:{ "Authorization":"Bearer "+token },
body:form
});

let d=await r.json();
result.innerText = d.result || d.error;
}
</script>

</body>
</html>
