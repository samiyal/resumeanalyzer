<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>
  <style>
    body { font-family: Arial; margin: 0; }
    .topbar {
      display: flex;
      justify-content: flex-end;
      padding: 10px;
      background: black;
    }
    button {
      padding: 6px 12px;
      margin-left: 10px;
      cursor: pointer;
    }
    .container {
      display: flex;
      height: 90vh;
    }
    .box {
      flex: 1;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 30%;
      left: 40%;
      background: white;
      padding: 20px;
      border: 1px solid black;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="openModal('login')">Login</button>
  <button onclick="openModal('signup')">Signup</button>
</div>

<div class="container">
  <div class="box">
    <h3>Resume</h3>
    <textarea id="resume_text"></textarea>
    <input type="file" id="resume_file">
  </div>

  <div class="box">
    <h3>Job Description</h3>
    <textarea id="jd_text"></textarea>
    <input type="file" id="jd_file">
  </div>
</div>

<div style="text-align:center;">
  <button onclick="analyze()">Analyze</button>
</div>

<pre id="result"></pre>

<!-- LOGIN MODAL -->
<div id="login" class="modal">
  <h3>Login</h3>
  <input id="login_email" placeholder="Email"><br><br>
  <input id="login_password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Submit</button>
</div>

<!-- SIGNUP MODAL -->
<div id="signup" class="modal">
  <h3>Signup</h3>
  <input id="signup_email" placeholder="Email"><br><br>
  <input id="signup_password" type="password" placeholder="Password"><br><br>
  <button onclick="signup()">Submit</button>
</div>

<script>
let API = "https://resumeanalyzer-5o8p.onrender.com";

function openModal(id){
  document.getElementById(id).style.display = "block";
}

async function signup(){
  let res = await fetch(API + "/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:signup_email.value,
      password:signup_password.value
    })
  });
  alert("Signup done");
}

async function login(){
  let res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:login_email.value,
      password:login_password.value
    })
  });

  let data = await res.json();
  localStorage.setItem("token", data.token);
  alert("Logged in");
}

async function analyze(){
  let formData = new FormData();

  formData.append("resume_text", document.getElementById("resume_text").value);
  formData.append("jd_text", document.getElementById("jd_text").value);

  let resumeFile = document.getElementById("resume_file").files[0];
  let jdFile = document.getElementById("jd_file").files[0];

  if(resumeFile) formData.append("resume_file", resumeFile);
  if(jdFile) formData.append("jd_file", jdFile);

  let res = await fetch(API + "/analyze", {
    method:"POST",
    headers:{
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body:formData
  });

  let data = await res.json();
  document.getElementById("result").innerText = data.result || data.msg;
}
</script>

</body>
</html>
