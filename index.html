<!DOCTYPE html>
<html>
<head>
<title>Resume Analyzer AI</title>
<style>
body { background:#0f172a; color:white; font-family:sans-serif; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:#1e293b; padding:20px; margin:15px 0; border-radius:10px; }
input, textarea { width:100%; padding:12px; margin-top:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:6px;}
button { padding:10px 15px; margin-top:10px; border:none; cursor:pointer; border-radius:6px;}
.btn-small { width:auto; margin-right:10px;}
.btn-main { width:100%; background:purple; color:white;}
.btn-upgrade { width:100%; background:red; color:white;}
#result { white-space:pre-wrap; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn-small" onclick="signup()">Signup</button>
<button class="btn-small" onclick="login()">Login</button>
</div>

<div class="card">
<h3>Job Description</h3>
<textarea id="jd_text"></textarea>
<input type="file" id="jd_file">
</div>

<div class="card">
<h3>Resume</h3>
<textarea id="resume_text"></textarea>
<input type="file" id="resume_file">
</div>

<div class="card">
<button class="btn-main" onclick="analyze()">Analyze</button>
<pre id="result"></pre>
</div>

<div class="card">
<button class="btn-upgrade" onclick="pay()">Upgrade via UPI</button>
</div>

</div>

<script>
const API="https://resumeanalyzer-5o8p.onrender.com";
let token="";

async function signup(){
let r=await fetch(API+"/signup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,password:password.value})});
alert((await r.json()).msg);
}

async function login(){
let r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value,password:password.value})});
let d=await r.json();
token=d.token; alert("Logged in");
}

async function analyze(){
let f=new FormData();
f.append("jd_text",jd_text.value);
f.append("resume_text",resume_text.value);
if(jd_file.files[0]) f.append("jd_file",jd_file.files[0]);
if(resume_file.files[0]) f.append("resume_file",resume_file.files[0]);

let r=await fetch(API+"/analyze",{method:"POST",headers:{"Authorization":"Bearer "+token},body:f});
let d=await r.json();
result.innerText=d.result||d.error;
}

async function pay(){
let r=await fetch(API+"/manual-payment",{method:"POST",headers:{"Authorization":"Bearer "+token}});
alert((await r.json()).msg);
}
</script>

</body>
</html>
