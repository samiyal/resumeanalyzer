<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Analyzer SaaS</title>
<style>
body { font-family: Arial; background: #f4f6f8; margin:0; padding:0; }
header { background:#0052cc; color:#fff; padding:20px; text-align:center; }
.container { max-width:700px; margin:20px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
input, textarea, button { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#0052cc; color:#fff; border:none; cursor:pointer; }
button:hover{ background:#003d99; }
#upiModal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
.modal-content { background:#fff; padding:20px; border-radius:10px; width:300px; text-align:center;}
</style>
</head>
<body>
<header>
<h1>Resume Analyzer SaaS</h1>
</header>

<div class="container">

<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<h3>Job Description</h3>
<textarea id="jd_text" rows="5" placeholder="Paste Job Description"></textarea>

<h3>Resume</h3>
<textarea id="resume_text" rows="5" placeholder="Paste Resume Text (optional if uploading file)"></textarea>
<input type="file" id="resume_file">

<button onclick="analyzeResume()">Analyze Resume</button>
<pre id="result"></pre>

<h3>Upgrade / Paid</h3>
<button onclick="openUPIModal()">Upgrade Now via UPI</button>

</div>

<!-- UPI Modal -->
<div id="upiModal">
  <div class="modal-content">
    <h3>Pay via UPI</h3>
    <p>Scan QR or use UPI ID:</p>
    <h2>8700343773@ptsbi</h2>
    <img src="https://api.qrserver.com/v1/create-qr-code/?data=upi://pay?pa=8700343773@ptsbi&pn=ResumeAnalyzer&am=499&cu=INR&tn=Upgrade&size=200x200">
    <input type="text" id="txn_id" placeholder="Transaction ID">
    <input type="file" id="upi_screenshot" accept="image/*">
    <button onclick="submitUPIPayment()">Submit Payment</button>
    <button onclick="closeUPIModal()">Cancel</button>
    <p id="upiMsg"></p>
  </div>
</div>

<script>
let token="";

// --- Signup/Login ---
async function signup(){
    const res = await fetch("/signup",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})});
    const data = await res.json(); alert(data.msg || data.error);
}
async function login(){
    const res = await fetch("/login",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})});
    const data = await res.json();
    if(data.token){ token=data.token; alert("Login successful"); } else{ alert(data.error); }
}

// --- Analyze ---
async function analyzeResume(){
    const formData = new FormData();
    formData.append("jd_text",document.getElementById("jd_text").value);
    formData.append("resume_text",document.getElementById("resume_text").value);
    if(document.getElementById("resume_file").files[0]) formData.append("resume_file",document.getElementById("resume_file").files[0]);
    try{
        const res = await fetch("/analyze",{method:"POST", headers:{"Authorization":"Bearer "+token}, body:formData});
        const data = await res.json();
        document.getElementById("result").innerText = data.result || data.error;
    }catch(e){ document.getElementById("result").innerText="❌ Error connecting to API"; }
}

// --- UPI Modal ---
function openUPIModal(){ document.getElementById("upiModal").style.display="flex"; }
function closeUPIModal(){ document.getElementById("upiModal").style.display="none"; }

async function submitUPIPayment(){
    const txn_id=document.getElementById("txn_id").value;
    const screenshot=document.getElementById("upi_screenshot").files[0];
    const formData=new FormData();
    if(txn_id) formData.append("txn_id",txn_id);
    if(screenshot) formData.append("screenshot",screenshot);

    try{
        const res = await fetch("/manual-payment",{method:"POST", headers:{"Authorization":"Bearer "+token}, body:formData});
        const data = await res.json();
        document.getElementById("upiMsg").innerText=data.msg || data.error;
        if(data.msg){ closeUPIModal(); document.getElementById("result").innerText="✅ Unlimited scans activated!"; }
    }catch(e){ document.getElementById("upiMsg").innerText="❌ Failed to submit payment"; }
}
</script>

</body>
</html>
