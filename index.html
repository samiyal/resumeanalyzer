<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'Inter',sans-serif; background:#0f172a; color:#f1f5f9; }
  header { padding:40px 20px; text-align:center; background:linear-gradient(90deg,#22c55e,#3b82f6); font-size:2rem; font-weight:600; }
  main { max-width:800px; margin:40px auto; padding:0 20px; }
  textarea { width:100%; height:150px; padding:15px; border-radius:8px; border:none; font-size:1rem; resize:vertical; margin-bottom:15px; background:#1e293b; color:#f1f5f9; }
  button { padding:15px 25px; background:#22c55e; border:none; border-radius:8px; color:white; font-size:1rem; cursor:pointer; transition:0.3s; }
  button:hover { background:#16a34a; }
  #result { margin-top:30px; background:#1e293b; padding:20px; border-radius:8px; white-space:pre-wrap; font-size:1rem; line-height:1.5; }
  footer { margin-top:60px; text-align:center; color:#94a3b8; font-size:0.9rem; }
</style>
</head>
<body>

<header>🚀 AI Resume Analyzer</header>

<main>
  <p>Paste the <strong>Job Description</strong> and your <strong>Resume</strong> below:</p>
  <textarea id="jobdesc" placeholder="Paste Job Description here...">We are looking for a Python Backend Developer to join our team. 
Requirements:
- Strong experience with Python and Flask/Django
- Experience with REST APIs and SQL databases
- Knowledge of cloud platforms (AWS/GCP)
- Ability to write clean, maintainable code
- Strong communication and teamwork skills</textarea>
  
  <textarea id="resume" placeholder="Paste your Resume here...">John Doe
Email: john.doe@example.com
LinkedIn: linkedin.com/in/johndoe

Experience:
- Backend Developer at XYZ Corp (2 years)
  - Built REST APIs in Python and Flask
  - Worked with PostgreSQL and MySQL databases
  - Collaborated with frontend team to deliver features
  - Deployed applications on AWS

Skills:
- Python, Flask, SQL, REST APIs, AWS
- Git, Docker, Unit Testing</textarea>
  
  <button onclick="analyzeResume()">Analyze Resume</button>
  <div id="result"></div>
</main>

<footer>Powered by OpenAI GPT • Made with ❤️</footer>

<script>
async function analyzeResume() {
  const resumeText = document.getElementById('resume').value;
  const jdText = document.getElementById('jobdesc').value;
  const resultDiv = document.getElementById('result');

  if(!resumeText.trim() || !jdText.trim()) {
    resultDiv.innerText = "⚠️ Please fill both Job Description and Resume!";
    return;
  }

  resultDiv.innerText = "Analyzing resume... 🔎";

  try {
    const response = await fetch("https://resumeanalyzer-5o8p.onrender.com/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume: resumeText, job_description: jdText })
    });

    const data = await response.json();

    if(data.error) {
      resultDiv.innerText = "❌ Error: " + data.error;
    } else {
      resultDiv.innerText = data.result;
    }

  } catch (err) {
    resultDiv.innerText = "❌ Failed to fetch API. Make sure backend is live.";
  }
}
</script>

</body>
</html>
