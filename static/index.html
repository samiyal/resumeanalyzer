<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .box {
      flex: 1;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 180px;
      margin-bottom: 10px;
      border-radius: 6px;
      padding: 10px;
      border: none;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    .center {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #2563eb;
    }

    #result {
      background: #020617;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .download-btn {
      margin-top: 10px;
      background: #22c55e;
    }
  </style>
</head>

<body>

<div class="header">🚀 AI Resume Analyzer</div>

<div class="container">
  <div class="box">
    <h3>Resume</h3>
    <textarea id="resume_text"></textarea>
    <input type="file" id="resume_file">
  </div>

  <div class="box">
    <h3>Job Description</h3>
    <textarea id="jd_text"></textarea>
    <input type="file" id="jd_file">
  </div>
</div>

<div class="center">
  <button onclick="analyze()">Analyze</button>
  <button class="download-btn" onclick="downloadResume()">Download Improved Resume</button>
</div>

<div id="result">Result will appear here...</div>

<script>

async function analyze() {
  let formData = new FormData();

  formData.append("resume_text", document.getElementById("resume_text").value);
  formData.append("jd_text", document.getElementById("jd_text").value);

  let resumeFile = document.getElementById("resume_file").files[0];
  let jdFile = document.getElementById("jd_file").files[0];

  if (resumeFile) formData.append("resume_file", resumeFile);
  if (jdFile) formData.append("jd_file", jdFile);

  document.getElementById("result").innerText = "Analyzing... ⏳";

  let res = await fetch("/analyze", {
    method: "POST",
    body: formData
  });

  let data = await res.json();

  document.getElementById("result").innerText =
    data.result || data.msg;
}


// DOWNLOAD FEATURE
function downloadResume() {
  let text = document.getElementById("result").innerText;

  if (!text.includes("Improved Resume")) {
    alert("Run analysis first!");
    return;
  }

  let improved = text.split("Improved Resume:")[1];

  let blob = new Blob([improved], { type: "text/plain" });
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "improved_resume.txt";
  a.click();
}

</script>

</body>
</html>
