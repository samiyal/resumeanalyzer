<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .box {
      flex: 1;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 180px;
      margin-bottom: 10px;
      border-radius: 6px;
      padding: 10px;
      border: none;
      font-family: monospace;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    .center {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 12px 30px;
      margin: 0 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #2563eb;
    }

    .download-btn {
      background: #22c55e;
    }

    .download-btn:hover {
      background: #16a34a;
    }

    #result {
      background: #020617;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
      font-family: monospace;
      line-height: 1.5;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="header">🚀 AI Resume Analyzer</div>

<div class="container">
  <div class="box">
    <h3>Resume</h3>
    <textarea id="resume_text" placeholder="Paste your resume text here..."></textarea>
    <input type="file" id="resume_file" accept=".txt,.pdf,.docx">
  </div>

  <div class="box">
    <h3>Job Description</h3>
    <textarea id="jd_text" placeholder="Paste job description here..."></textarea>
    <input type="file" id="jd_file" accept=".txt,.pdf,.docx">
  </div>
</div>

<div class="center">
  <button onclick="analyze()">🔍 Analyze</button>
  <button class="download-btn" onclick="downloadResume()">📥 Download Improved Resume</button>
</div>

<div id="result">✨ Result will appear here... ✨</div>

<script>

async function analyze() {
  let formData = new FormData();

  formData.append("resume_text", document.getElementById("resume_text").value);
  formData.append("jd_text", document.getElementById("jd_text").value);

  let resumeFile = document.getElementById("resume_file").files[0];
  let jdFile = document.getElementById("jd_file").files[0];

  if (resumeFile) formData.append("resume_file", resumeFile);
  if (jdFile) formData.append("jd_file", jdFile);

  const resultDiv = document.getElementById("result");
  resultDiv.innerText = "🔄 Analyzing... Please wait... ⏳";

  try {
    let res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    let data = await res.json();

    if (data.result) {
      resultDiv.innerText = data.result;
    } else {
      resultDiv.innerText = "Error: " + (data.msg || "Unknown error occurred");
    }
  } catch (error) {
    resultDiv.innerText = "Error: " + error.message;
  }
}

// DOWNLOAD FEATURE - FIXED VERSION
function downloadResume() {
  const resultText = document.getElementById("result").innerText;
  
  // Check if we have analysis results
  if (resultText.includes("Result will appear here") || resultText.includes("Analyzing")) {
    alert("⚠️ Please run the analysis first!");
    return;
  }

  // Extract the improved resume section
  let improvedResume = "";
  
  // Look for "Improved Resume:" section
  if (resultText.includes("Improved Resume:")) {
    // Split by "Improved Resume:" and take the second part
    improvedResume = resultText.split("Improved Resume:")[1];
    
    // Optional: Remove any trailing sections if needed
    // Remove anything after "---" or similar separators if present
    const sections = improvedResume.split(/\n(?=[A-Z\s]+:)/);
    improvedResume = sections[0];
  } else {
    alert("⚠️ No improved resume found in the analysis. Please try analyzing again.");
    return;
  }

  // Clean up the extracted text
  improvedResume = improvedResume.trim();
  
  if (improvedResume.length < 50) {
    alert("⚠️ The improved resume section is too short. Please try analyzing again.");
    return;
  }

  // Create and download the file
  const blob = new Blob([improvedResume], { type: "text/plain" });
  const a = document.createElement("a");
  const url = URL.createObjectURL(blob);
  
  a.href = url;
  a.download = "improved_resume.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  alert("✅ Improved resume downloaded successfully!");
}

</script>

</body>
</html>
